<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوق الأسهم — بورصة تألق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-alt: #F7F8FA;
    --border: #E3E6EA;
    --text: #1A2332;
    --text-dim: #6B7684;
    --navy: #0B2545;
    --up: #0E9F5C;
    --up-bg: #E7F7EF;
    --down: #D62B3C;
    --down-bg: #FCEAEC;
    --gold: #C9941F;
    --gold-bg: #FBF3E2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Cairo',sans-serif; overflow:hidden; height:100vh; direction:rtl; }

  /* ===== شريط التيكر العلوي ===== */
  .ticker-wrap { background:var(--navy); height:38px; display:flex; align-items:center; overflow:hidden; position:relative; }
  .ticker-wrap::before,.ticker-wrap::after { content:''; position:absolute; top:0; bottom:0; width:60px; z-index:2; pointer-events:none; }
  .ticker-wrap::before { right:0; background:linear-gradient(to left,var(--navy),transparent); }
  .ticker-wrap::after { left:0; background:linear-gradient(to right,var(--navy),transparent); }
  .ticker-track { display:flex; gap:32px; white-space:nowrap; animation:scroll-rtl 50s linear infinite; padding-right:100%; }
  @keyframes scroll-rtl { from{transform:translateX(0)} to{transform:translateX(-100%)} }
  .ticker-item { display:flex; align-items:center; gap:7px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:13px; color:#fff; }
  .ticker-name { color:#9BB1CC; font-weight:500; font-size:11px; }
  .ticker-price { font-variant-numeric:tabular-nums; }
  .ticker-change { font-size:11px; font-variant-numeric:tabular-nums; }
  .ticker-wrap .up { color:#4ADE9B; }
  .ticker-wrap .down { color:#FF8A98; }

  /* ===== شريط الأخبار (3× الحجم) ===== */
  .news-bar {
    background: var(--gold-bg);
    border-bottom: 2px solid var(--gold);
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .news-tag {
    background: var(--gold);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 24px;
    padding: 0 28px;
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  .news-track-wrap { flex:1; overflow:hidden; height:100%; position:relative; }
  #newsTrack { height:100%; display:flex; align-items:center; }
  .news-item-single {
    position: absolute;
    white-space: nowrap;
    font-size: 32px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 800;
    color: #6B5410;
    top: 50%;
    left: 100%;
    transform: translateY(-50%);
    animation: news-single-scroll linear forwards;
  }
  @keyframes news-single-scroll { from{left:100%} to{left:-150%} }

  /* ===== Header ===== */
  .header { display:flex; align-items:center; justify-content:space-between; padding:8px 24px; border-bottom:1px solid var(--border); height:52px; }
  .brand { font-family:'Tajawal',sans-serif; font-weight:900; font-size:20px; color:var(--navy); }
  .brand span { color:var(--gold); }
  .market-index { display:flex; align-items:center; gap:10px; }
  .idx-label { color:var(--text-dim); font-size:12px; }
  .idx-value { font-family:'Tajawal',sans-serif; font-weight:900; font-size:22px; font-variant-numeric:tabular-nums; color:var(--navy); }
  .idx-change { font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }
  .up { color:var(--up); }
  .down { color:var(--down); }
  .clock { color:var(--text-dim); font-size:12px; font-variant-numeric:tabular-nums; }

  /* ===== شبكة الأسهم 5×3 ===== */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
    height: calc(100vh - 38px - 80px - 52px);
  }
  .stock-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: border-color 0.3s ease;
  }
  .stock-card.flash-up { animation:flashUp 1.2s ease; }
  .stock-card.flash-down { animation:flashDown 1.2s ease; }
  @keyframes flashUp { 0%{background:var(--up-bg);border-color:var(--up)} 100%{background:var(--bg)} }
  @keyframes flashDown { 0%{background:var(--down-bg);border-color:var(--down)} 100%{background:var(--bg)} }

  .stock-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .stock-ticker { font-family:'Tajawal',sans-serif; font-weight:900; font-size:17px; color:var(--navy); }
  .spark { flex-shrink:0; }
  .stock-name { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:6px; }
  .stock-bottom { display:flex; justify-content:space-between; align-items:baseline; }
  .stock-price { font-family:'Tajawal',sans-serif; font-weight:900; font-size:22px; font-variant-numeric:tabular-nums; }
  .stock-change { font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
<div class="news-bar" id="newsBarEl">
  <div class="news-tag">عاجل</div>
  <div class="news-track-wrap"><div id="newsTrack"></div></div>
</div>
<div class="header">
  <div class="brand">بورصة <span>تألق</span></div>
  <div class="market-index">
    <span class="idx-label">المؤشر العام</span>
    <span class="idx-value" id="marketIndex">—</span>
    <span class="idx-change" id="marketIndexChange"></span>
  </div>
  <div class="clock" id="clock"></div>
</div>
<div class="stock-grid" id="stockGrid"></div>

<script>
const SUPABASE_URL='https://reiyrcqafvejnbeejava.supabase.co';
const SUPABASE_KEY='sb_publishable_2FGcmrEoGCouOiaDy_1HGw_qjzRYocC';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let companies=[], priceHistory={};
let newsQueue=[], newsTimerActive=false;

const NEUTRAL_NEWS=[c=>`تقارير: ${c.name} تسجل نشاطًا تداوليًا لافتًا`,c=>`${c.name} ضمن الأسهم الأكثر تداولًا`,c=>`محللون يراقبون تحركات سهم ${c.ticker} عن كثب`];
const POSITIVE_NEWS=[c=>`صفقة كبيرة: مؤسسة مالية تنفذ شراء ضخم على سهم ${c.ticker}`,c=>`تقارير إيجابية ترفع التوقعات حول ${c.name}`,c=>`طلب قوي وملحوظ على أسهم ${c.ticker} في الجلسة الحالية`];
const NEGATIVE_NEWS=[c=>`مؤسسة مالية تنفذ عمليات بيع كبيرة على سهم ${c.ticker}`,c=>`تقارير تشير لمخاوف مستثمرين حول ${c.name}`,c=>`ضغط بيعي ملحوظ على أسهم ${c.ticker} في الجلسة الحالية`];

function fmt(n){return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function renderSparkline(history){
  if(!history||history.length<2) return '';
  const w=54,h=24;
  const min=Math.min(...history),max=Math.max(...history),range=max-min||1;
  const pts=history.map((p,i)=>`${((i/(history.length-1))*w).toFixed(1)},${(h-((p-min)/range)*h).toFixed(1)}`).join(' ');
  const color=history[history.length-1]>=history[0]?'var(--up)':'var(--down)';
  return `<svg class="spark" width="${w}" height="${h}" style="flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderStocks(changedIds={}){
  const grid=document.getElementById('stockGrid');
  grid.innerHTML=companies.map(c=>{
    const change=c.current_price-c.previous_price;
    const pct=c.previous_price?(change/c.previous_price)*100:0;
    const cls=change>=0?'up':'down';
    const arrow=change>=0?'▲':'▼';
    const flash=changedIds[c.id]?(changedIds[c.id]==='up'?'flash-up':'flash-down'):'';
    const spark=renderSparkline(priceHistory[c.id]||[]);
    return `<div class="stock-card ${flash}">
      <div class="stock-top"><span class="stock-ticker">${c.ticker}</span>${spark}</div>
      <div class="stock-name">${c.name}</div>
      <div class="stock-bottom"><span class="stock-price ${cls}">${fmt(c.current_price)}</span><span class="stock-change ${cls}">${arrow}${Math.abs(pct).toFixed(2)}%</span></div>
    </div>`;
  }).join('');

  const avgPct=companies.length?companies.reduce((s,c)=>s+(c.previous_price?((c.current_price-c.previous_price)/c.previous_price)*100:0),0)/companies.length:0;
  document.getElementById('marketIndex').textContent=(10000*(1+avgPct/100)).toFixed(2);
  const el=document.getElementById('marketIndexChange');
  el.className='idx-change '+(avgPct>=0?'up':'down');
  el.textContent=(avgPct>=0?'▲ ':'▼ ')+Math.abs(avgPct).toFixed(2)+'%';
}

function renderTicker(){
  const track=document.getElementById('tickerTrack');
  const items=companies.map(c=>{
    const change=c.current_price-c.previous_price;
    const pct=c.previous_price?(change/c.previous_price)*100:0;
    const cls=change>=0?'up':'down';
    return `<div class="ticker-item"><span>${c.ticker}</span><span class="ticker-name">${c.name}</span><span class="ticker-price">${fmt(c.current_price)}</span><span class="ticker-change ${cls}">${change>=0?'▲':'▼'}${Math.abs(pct).toFixed(2)}%</span></div>`;
  }).join('');
  track.innerHTML=items+items;
}

function showNextNews(){
  if(!newsQueue.length){newsTimerActive=false;return;}
  newsTimerActive=true;
  const text=newsQueue.shift();
  const track=document.getElementById('newsTrack');
  track.innerHTML='';
  const el=document.createElement('div');
  el.className='news-item-single';
  el.textContent=text;
  track.appendChild(el);
  const dur=Math.max(16,Math.min(28,text.length*0.32));
  el.style.animationDuration=dur+'s';
  el.addEventListener('animationend',()=>showNextNews());
}
function addNewsItem(text){
  newsQueue.push(text);
  if(newsQueue.length>15)newsQueue.shift();
  if(!newsTimerActive)showNextNews();
}
function seedNews(){
  newsQueue=[];
  for(let i=0;i<4;i++){const c=companies[Math.floor(Math.random()*companies.length)];addNewsItem(NEUTRAL_NEWS[Math.floor(Math.random()*NEUTRAL_NEWS.length)](c));}
  showNextNews();
}

async function loadAll(){
  const {data:c}=await sb.from('companies').select('*').order('ticker');
  companies=c||[];
  companies.forEach(c=>{priceHistory[c.id]=[c.current_price];});
  renderTicker();renderStocks();seedNews();
}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(updateClock,1000);updateClock();
loadAll();

/* نفس منطق تحديث الأسعار من display.html */
let activeSignals=[];
let trendStates={};
const SIGNAL_DELAY_MS=3*60*1000, SIGNAL_WAVE_MS=10*60*1000;
const ABSOLUTE_MIN_PRICE=0.5, MAX_DROP_FROM_PEAK_PCT=30, MAX_CHANGE_PERCENT=30;

function volatilityRange(type){return{calm:6,wild:30,trend_up:12,trend_down:12}[type]||16;}
function computeChangePercent(c){
  const type=c.volatility_type||'medium', range=volatilityRange(type);
  let raw=(Math.random()*2-1)*range;
  if(type==='trend_up')raw=Math.abs(raw)*0.75+(Math.random()*2-1)*2;
  if(type==='trend_down')raw=-Math.abs(raw)*0.75+(Math.random()*2-1)*2;
  const state=trendStates[c.id];
  if(state&&state.direction)raw+=state.direction==='up'?range*0.5:-range*0.5;
  const now=Date.now();
  activeSignals.forEach(sig=>{
    if(sig.companyId!==c.id||now<sig.waveStartTime||now>sig.waveEndTime)return;
    const progress=(now-sig.waveStartTime)/(sig.waveEndTime-sig.waveStartTime);
    raw+=(range*0.8*Math.sin(progress*Math.PI))*(sig.direction==='up'?1:-1);
  });
  return raw;
}
function advanceTrendStates(){
  companies.forEach(c=>{
    let s=trendStates[c.id];
    if(s&&s.remaining>0){s.remaining--;if(s.remaining<=0)trendStates[c.id]=null;}
    else if(Math.random()<0.18)trendStates[c.id]={direction:Math.random()<0.5?'up':'down',remaining:2+Math.floor(Math.random()*3)};
  });
}
function cleanupExpiredSignals(){const now=Date.now();activeSignals=activeSignals.filter(s=>now<=s.waveEndTime);}

async function tickPrices(){
  if(!companies.length)return;
  advanceTrendStates();
  const updates=companies.map(c=>{
    let newPrice=c.current_price*(1+computeChangePercent(c)/100);
    const peak=c.peak_price||c.current_price;
    newPrice=Math.max(newPrice,peak*(1-MAX_DROP_FROM_PEAK_PCT/100),ABSOLUTE_MIN_PRICE);
    newPrice=Math.round(newPrice*100)/100;
    return{id:c.id,previous_price:c.current_price,current_price:newPrice,peak_price:Math.max(peak,newPrice),ticker:c.ticker,name:c.name};
  });
  for(const u of updates){
    await sb.from('companies').update({previous_price:u.previous_price,current_price:u.current_price,peak_price:u.peak_price,updated_at:new Date().toISOString()}).eq('id',u.id);
  }
  sb.from('price_history').insert(updates.map(u=>({company_id:u.id,price:u.current_price})));
  cleanupExpiredSignals();
}

function scheduleSignalNews(){
  if(!companies.length)return;
  if(Math.random()<0.55){
    const c=companies[Math.floor(Math.random()*companies.length)];
    const direction=Math.random()<0.5?'up':'down';
    const now=Date.now();
    activeSignals.push({companyId:c.id,direction,waveStartTime:now+SIGNAL_DELAY_MS,waveEndTime:now+SIGNAL_DELAY_MS+SIGNAL_WAVE_MS});
    const pool=direction==='up'?POSITIVE_NEWS:NEGATIVE_NEWS;
    addNewsItem(pool[Math.floor(Math.random()*pool.length)](c));
  } else {
    const c=companies[Math.floor(Math.random()*companies.length)];
    addNewsItem(NEUTRAL_NEWS[Math.floor(Math.random()*NEUTRAL_NEWS.length)](c));
  }
}
function scheduleNextTick(){
  const delay=12000+Math.random()*13000;
  setTimeout(async()=>{await tickPrices();scheduleNextTick();},delay);
}
function scheduleNextNews(){
  const delay=30000+Math.random()*20000;
  setTimeout(()=>{scheduleSignalNews();scheduleNextNews();},delay);
}
scheduleNextTick();scheduleNextNews();

sb.channel('public:companies')
  .on('postgres_changes',{event:'UPDATE',schema:'public',table:'companies'},payload=>{
    const idx=companies.findIndex(c=>c.id===payload.new.id);
    const changed={};
    if(idx>=0){
      changed[payload.new.id]=payload.new.current_price>=companies[idx].current_price?'up':'down';
      companies[idx]=payload.new;
      if(!priceHistory[payload.new.id])priceHistory[payload.new.id]=[];
      priceHistory[payload.new.id].push(payload.new.current_price);
      if(priceHistory[payload.new.id].length>8)priceHistory[payload.new.id].shift();
    }
    renderTicker();renderStocks(changed);
  }).subscribe();

sb.channel('public:app_settings')
  .on('postgres_changes',{event:'*',schema:'public',table:'app_settings'},()=>{applyDisplaySettings();}).subscribe();

async function applyDisplaySettings(){
  const{data}=await sb.from('app_settings').select('key,value').in('key',['show_news_bar','show_market_index']);
  const s={};(data||[]).forEach(r=>{s[r.key]=r.value;});
  document.getElementById('newsBarEl').style.display=s.show_news_bar==='false'?'none':'flex';
  document.getElementById('marketIndexChange').parentElement.style.display=s.show_market_index==='false'?'none':'flex';
}
applyDisplaySettings();
</script>
</body>
</html>
