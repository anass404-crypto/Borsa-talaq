<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مشرف المنافسات — بورصة تألق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0A0E14;
    --surface: #131820;
    --surface-2: #1A2029;
    --border: #232a35;
    --text: #E8EAED;
    --text-dim: #6B7684;
    --up: #00D964;
    --down: #FF3B5C;
    --gold: #D4A645;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    direction: rtl;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 18px 40px;
  }

  /* ===== Header ===== */
  .brand {
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 22px;
    margin-bottom: 4px;
    text-align: center;
  }
  .brand span { color: var(--gold); }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ===== Login screen ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 22px;
    width: 100%;
    max-width: 380px;
  }
  .field-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
    font-weight: 600;
  }
  input[type="password"], input[type="number"], select {
    width: 100%;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input::placeholder { color: var(--text-dim); font-weight: 400; }

  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7684' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: left 14px center;
    padding-left: 40px;
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 17px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 800;
    font-size: 17px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.2s ease;
    margin-top: 10px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--gold); color: #1a1505; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 14px; }

  .error-msg {
    color: var(--down);
    font-size: 14px;
    margin-top: 12px;
    text-align: center;
    min-height: 18px;
  }

  .field-group { margin-bottom: 18px; }

  /* ===== Group quick-select chips ===== */
  .group-chips {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .chip {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 6px;
  }
  .chip-name { font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 15px; }
  .chip-balance { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .chip.selected { border-color: var(--gold); background: rgba(212,166,69,0.12); }

  /* ===== Quick amount buttons ===== */
  .quick-amounts {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .quick-amt-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    color: var(--text-dim);
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .quick-amt-btn:active { background: var(--surface); }

  /* ===== Success state ===== */
  .success-box {
    text-align: center;
    padding: 20px 0;
  }
  .success-icon {
    width: 64px; height: 64px;
    background: rgba(0,217,100,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
  }
  .success-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 800;
    font-size: 19px;
    margin-bottom: 6px;
  }
  .success-detail { color: var(--text-dim); font-size: 14px; }
  .success-detail b { color: var(--gold); font-variant-numeric: tabular-nums; }

  .hidden { display: none !important; }

  .top-bar {
    width: 100%;
    max-width: 380px;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .logout-link {
    color: var(--text-dim);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="brand">بورصة <span>تألق</span></div>
<div class="subtitle">لوحة مشرف المنافسات</div>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div class="card" id="loginScreen">
  <div class="field-group">
    <label class="field-label">كلمة المرور</label>
    <input type="password" id="passwordInput" placeholder="أدخل كلمة المرور" inputmode="numeric">
  </div>
  <button class="btn btn-primary" id="loginBtn">دخول</button>
  <div class="error-msg" id="loginError"></div>
</div>

<!-- ===== شاشة إضافة الرصيد ===== -->
<div class="hidden" id="mainScreen" style="width:100%; max-width:380px;">
  <div class="top-bar"><span class="logout-link" id="logoutBtn">تسجيل خروج</span></div>

  <div class="card">
    <label class="field-label">اختر المجموعة</label>
    <div class="group-chips" id="groupChips"></div>

    <label class="field-label">المبلغ المراد إضافته (ريال)</label>
    <div class="quick-amounts" id="quickAmounts">
      <button class="quick-amt-btn" data-amt="500">+500</button>
      <button class="quick-amt-btn" data-amt="1000">+1,000</button>
      <button class="quick-amt-btn" data-amt="2000">+2,000</button>
    </div>
    <input type="number" id="amountInput" placeholder="أو أدخل مبلغًا آخر" inputmode="numeric">

    <button class="btn btn-primary" id="submitBtn" disabled>إضافة الرصيد</button>
    <div class="error-msg" id="submitError"></div>
  </div>
</div>

<!-- ===== شاشة التأكيد ===== -->
<div class="hidden" id="successScreen" style="width:100%; max-width:380px;">
  <div class="card success-box">
    <div class="success-icon">✅</div>
    <div class="success-title">تمت إضافة الرصيد</div>
    <div class="success-detail">تمت إضافة <b id="successAmount"></b> ريال لمجموعة <b id="successGroup"></b></div>
    <button class="btn btn-primary" id="newOperationBtn" style="margin-top:24px;">عملية جديدة</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://reiyrcqafvejnbeejava.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2FGcmrEoGCouOiaDy_1HGw_qjzRYocC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// كلمة المرور المشتركة لمشرفي المنافسات (يمكن تغييرها هنا)
// كلمة المرور تُقرأ الآن من قاعدة البيانات (قابلة للتعديل من لوحة إدارة المسابقة)
async function getAdminPassword() {
  const { data } = await sb.from('app_settings').select('value').eq('key', 'password_competitions').single();
  return data ? data.value : null;
}

let groups = [];
let selectedGroupId = null;
let selectedAmount = null;

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// ===== تسجيل الدخول =====
document.getElementById('loginBtn').addEventListener('click', async () => {
  const val = document.getElementById('passwordInput').value;
  const ADMIN_PASSWORD = await getAdminPassword();
  if (ADMIN_PASSWORD !== null && val === ADMIN_PASSWORD) {
    sessionStorage.setItem('nadi_admin_auth', '1');
    showMainScreen();
  } else {
    document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة';
  }
});

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('nadi_admin_auth');
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('successScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('passwordInput').value = '';
});

async function showMainScreen() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainScreen').classList.remove('hidden');
  await loadGroups();
}

// ===== تحميل المجموعات =====
async function loadGroups() {
  const { data } = await sb.from('groups').select('*').order('name');
  groups = data || [];
  renderGroupChips();
}

function renderGroupChips() {
  const container = document.getElementById('groupChips');
  container.innerHTML = groups.map(g => `
    <div class="chip ${selectedGroupId === g.id ? 'selected' : ''}" data-id="${g.id}">
      <div class="chip-name"><span class="chip-dot" style="background:${g.color}"></span>${g.name}</div>
      <div class="chip-balance">${fmt(g.balance)} ر.س</div>
    </div>
  `).join('');

  container.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      selectedGroupId = chip.dataset.id;
      renderGroupChips();
      validateForm();
    });
  });
}

// ===== اختيار المبلغ =====
document.querySelectorAll('.quick-amt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('amountInput').value = btn.dataset.amt;
    validateForm();
  });
});

document.getElementById('amountInput').addEventListener('input', validateForm);

function validateForm() {
  const amt = parseFloat(document.getElementById('amountInput').value);
  selectedAmount = amt;
  const valid = selectedGroupId && amt && amt > 0;
  document.getElementById('submitBtn').disabled = !valid;
}

// ===== إضافة الرصيد =====
document.getElementById('submitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإضافة...';
  document.getElementById('submitError').textContent = '';

  try {
    const group = groups.find(g => g.id === selectedGroupId);
    const newBalance = Number(group.balance) + Number(selectedAmount);

    const { error: updateError } = await sb
      .from('groups')
      .update({ balance: newBalance })
      .eq('id', selectedGroupId);

    if (updateError) throw updateError;

    await sb.from('admin_actions').insert({
      group_id: selectedGroupId,
      amount: selectedAmount,
      added_by: 'مشرف منافسات'
    });

    document.getElementById('successAmount').textContent = fmt(selectedAmount);
    document.getElementById('successGroup').textContent = group.name;
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('successScreen').classList.remove('hidden');

  } catch (err) {
    document.getElementById('submitError').textContent = 'حدث خطأ، حاول مرة أخرى';
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'إضافة الرصيد';
  }
});

document.getElementById('newOperationBtn').addEventListener('click', async () => {
  selectedGroupId = null;
  selectedAmount = null;
  document.getElementById('amountInput').value = '';
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('successScreen').classList.add('hidden');
  document.getElementById('mainScreen').classList.remove('hidden');
  await loadGroups(); // تحديث الأرصدة المعروضة
});

// ===== تحقق من جلسة سابقة =====
if (sessionStorage.getItem('nadi_admin_auth') === '1') {
  showMainScreen();
}
</script>
</body>
</html>
