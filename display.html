<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورصة تألق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-alt: #F7F8FA;
    --border: #E3E6EA;
    --text: #1A2332;
    --text-dim: #6B7684;
    --navy: #0B2545;
    --navy-light: #14365E;
    --up: #0E9F5C;
    --up-bg: #E7F7EF;
    --down: #D62B3C;
    --down-bg: #FCEAEC;
    --gold: #C9941F;
    --gold-bg: #FBF3E2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    height: 100vh;
    direction: rtl;
  }

  .ticker-wrap {
    background: var(--navy);
    height: 40px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .ticker-wrap::before, .ticker-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 50px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker-wrap::before { right: 0; background: linear-gradient(to left, var(--navy), transparent); }
  .ticker-wrap::after { left: 0; background: linear-gradient(to right, var(--navy), transparent); }
  .ticker-track {
    display: flex;
    gap: 32px;
    white-space: nowrap;
    animation: scroll-rtl 55s linear infinite;
    padding-right: 100%;
  }
  @keyframes scroll-rtl { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  .ticker-item { display: flex; align-items: center; gap: 6px; font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 13px; color: #fff; }
  .ticker-item .tk-name { color: #9BB1CC; font-weight: 500; font-size: 11px; }
  .ticker-item .tk-price { font-variant-numeric: tabular-nums; }
  .ticker-item .tk-change { font-size: 11px; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .ticker-wrap .up { color: #4ADE9B; }
  .ticker-wrap .down { color: #FF8A98; }

  .news-bar {
    background: var(--gold-bg);
    border-bottom: 1px solid var(--border);
    height: 26px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .news-tag {
    background: var(--gold);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-weight: 800;
    font-size: 10px;
    padding: 3px 10px;
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    z-index: 3;
  }
  .news-track-wrap { flex: 1; overflow: hidden; position: relative; height: 100%; }
  .news-track {
    display: flex;
    gap: 44px;
    white-space: nowrap;
    position: absolute;
    animation: scroll-rtl 38s linear infinite;
    padding-right: 100%;
    align-items: center;
    height: 100%;
  }
  .news-item { font-size: 11.5px; color: #6B5410; font-weight: 600; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 22px;
    border-bottom: 1px solid var(--border);
  }
  .brand { font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 19px; color: var(--navy); }
  .brand span { color: var(--gold); }
  .market-index { display: flex; align-items: center; gap: 8px; font-family: 'Tajawal', sans-serif; }
  .market-index .idx-label { color: var(--text-dim); font-size: 11px; font-family: 'Cairo', sans-serif; }
  .market-index .idx-value { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--navy); }
  .clock { color: var(--text-dim); font-size: 11px; font-variant-numeric: tabular-nums; }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 40px - 26px - 49px);
  }
  .panel { overflow-y: auto; padding: 12px 16px; }
  .panel:first-child { border-left: 1px solid var(--border); }
  .panel-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--navy);
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-title::before { content: ''; width: 3px; height: 12px; background: var(--gold); border-radius: 2px; }

  /* ===== Stock grid (نصف الشاشة اليسار) ===== */
  .stock-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
  .stock-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
  }
  .stock-card.flash-up { animation: flashUp 1s ease; }
  .stock-card.flash-down { animation: flashDown 1s ease; }
  @keyframes flashUp { 0% { background: var(--up-bg); border-color: var(--up); } 100% { background: var(--bg); } }
  @keyframes flashDown { 0% { background: var(--down-bg); border-color: var(--down); } 100% { background: var(--bg); } }

  .stock-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .stock-ticker { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 13px; color: var(--navy); }
  .stock-sector { font-size: 8.5px; color: var(--text-dim); background: var(--bg-alt); padding: 1px 5px; border-radius: 4px; }
  .stock-name { font-size: 10px; color: var(--text-dim); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stock-bottom { display: flex; justify-content: space-between; align-items: flex-end; gap: 5px; }
  .stock-price { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 15px; font-variant-numeric: tabular-nums; }
  .stock-change { font-size: 10.5px; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 2px; }
  .spark { flex-shrink: 0; }

  /* ===== Portfolios grid (نصف الشاشة اليمين) ===== */
  .portfolios-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .portfolio-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px;
    display: flex;
    flex-direction: column;
  }
  .portfolio-card.rank-1 { border-color: var(--gold); box-shadow: 0 2px 10px rgba(201,148,31,0.16); }

  .pf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .pf-name-wrap { display: flex; align-items: center; gap: 6px; }
  .pf-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .pf-name { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 14px; color: var(--navy); }
  .pf-rank-badge {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg-alt);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 10.5px;
  }
  .rank-1 .pf-rank-badge { background: var(--gold); color: #fff; }

  .pf-totals { display: flex; justify-content: space-between; margin-bottom: 7px; padding-bottom: 7px; border-bottom: 1px dashed var(--border); }
  .pf-total-item { text-align: center; flex: 1; }
  .pf-total-label { font-size: 8.5px; color: var(--text-dim); margin-bottom: 1px; }
  .pf-total-value { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .pf-total-value.grand { color: var(--navy); font-size: 14px; }

  .pf-positions { flex: 1; overflow-y: auto; }
  .pf-position-row {
    display: grid;
    grid-template-columns: 1.3fr 0.7fr 1fr 1fr;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--bg-alt);
    font-size: 9.5px;
  }
  .pf-position-row.header-row {
    font-weight: 700;
    color: var(--text-dim);
    font-size: 8.5px;
    border-bottom: 1px solid var(--border);
  }
  .pf-pos-ticker { font-family: 'Tajawal', sans-serif; font-weight: 700; color: var(--navy); font-size: 10px; }
  .pf-pos-qty { font-variant-numeric: tabular-nums; color: var(--text-dim); }
  .pf-pos-avg { font-variant-numeric: tabular-nums; color: var(--text-dim); }
  .pf-pos-pl { font-variant-numeric: tabular-nums; font-weight: 700; text-align: left; }
  .pf-pos-pl.up { color: var(--up); }
  .pf-pos-pl.down { color: var(--down); }
  .pf-empty { text-align: center; color: var(--text-dim); font-size: 10px; padding: 14px 0; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<div class="news-bar">
  <div class="news-tag">عاجل</div>
  <div class="news-track-wrap"><div class="news-track" id="newsTrack"></div></div>
</div>

<div class="header">
  <div class="brand">بورصة <span>تألق</span></div>
  <div class="market-index">
    <span class="idx-label">المؤشر العام</span>
    <span class="idx-value" id="marketIndex">—</span>
    <span class="stock-change" id="marketIndexChange"></span>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-title">سوق الأسهم</div>
    <div class="stock-grid" id="stockGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">محافظ المجموعات</div>
    <div class="portfolios-grid" id="portfoliosGrid"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://reiyrcqafvejnbeejava.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2FGcmrEoGCouOiaDy_1HGw_qjzRYocC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let companies = [];
let groups = [];
let holdings = [];
let priceHistory = {};

const NEWS_TEMPLATES = [
  c => `صفقة كبيرة: مؤسسة مالية تنفذ شراء ضخم على سهم ${c.ticker}`,
  c => `تقارير: ${c.name} تسجل نشاطًا تداوليًا لافتًا اليوم`,
  c => `محللون: سهم ${c.ticker} يشهد تذبذبًا واسعًا في الجلسة الحالية`,
  c => `${c.name} ضمن الأسهم الأكثر تداولًا حاليًا`,
];

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

let audioCtx = null;
function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
    osc.start(); osc.stop(audioCtx.currentTime + 0.45);
  } catch(e) { console.warn('Audio failed', e); }
}
// تفعيل سياق الصوت بأول تفاعل من المستخدم (قيد أمان بالمتصفحات)
document.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    return `<div class="ticker-item">
      <span class="tk-ticker">${c.ticker}</span>
      <span class="tk-name">${c.name}</span>
      <span class="tk-price">${fmt(c.current_price)}</span>
      <span class="tk-change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>
    </div>`;
  }).join('');
  track.innerHTML = items + items;
}

function renderSparkline(history) {
  if (!history || history.length < 2) return '';
  const w = 40, h = 18;
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const points = history.map((p, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((p - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const trendUp = history[history.length - 1] >= history[0];
  const color = trendUp ? 'var(--up)' : 'var(--down)';
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderStocks(changedIds = {}) {
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    const flashClass = changedIds[c.id] ? (changedIds[c.id] === 'up' ? 'flash-up' : 'flash-down') : '';
    const spark = renderSparkline(priceHistory[c.id] || []);
    return `<div class="stock-card ${flashClass}">
      <div class="stock-top">
        <span class="stock-ticker">${c.ticker}</span>
        <span class="stock-sector">${c.sector || ''}</span>
      </div>
      <div class="stock-name">${c.name}</div>
      <div class="stock-bottom">
        <div>
          <div class="stock-price">${fmt(c.current_price)}</div>
          <div class="stock-change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</div>
        </div>
        ${spark}
      </div>
    </div>`;
  }).join('');

  const avgPct = companies.length
    ? companies.reduce((sum, c) => sum + (c.previous_price ? ((c.current_price - c.previous_price) / c.previous_price) * 100 : 0), 0) / companies.length
    : 0;
  document.getElementById('marketIndex').textContent = (10000 * (1 + avgPct/100)).toFixed(2);
  const idxChangeEl = document.getElementById('marketIndexChange');
  idxChangeEl.className = 'stock-change ' + (avgPct >= 0 ? 'up' : 'down');
  idxChangeEl.textContent = (avgPct >= 0 ? '▲ ' : '▼ ') + Math.abs(avgPct).toFixed(2) + '%';
}

function portfolioStockValue(groupId) {
  return holdings.filter(h => h.group_id === groupId).reduce((sum, h) => {
    const c = companies.find(c => c.id === h.company_id);
    return sum + (c ? c.current_price * h.shares_owned : 0);
  }, 0);
}

function renderPortfolios() {
  const grid = document.getElementById('portfoliosGrid');
  const ranked = [...groups]
    .map(g => ({ ...g, stockVal: portfolioStockValue(g.id), total: g.balance + portfolioStockValue(g.id) }))
    .sort((a, b) => b.total - a.total);

  grid.innerHTML = ranked.map((g, i) => {
    const positions = holdings
      .filter(h => h.group_id === g.id && h.shares_owned > 0)
      .map(h => {
        const c = companies.find(c => c.id === h.company_id);
        if (!c) return null;
        const currentVal = c.current_price * h.shares_owned;
        const costVal = h.avg_purchase_price * h.shares_owned;
        const pl = currentVal - costVal;
        const plPct = costVal ? (pl / costVal) * 100 : 0;
        return { ticker: c.ticker, qty: h.shares_owned, avgPrice: h.avg_purchase_price, pl, plPct };
      })
      .filter(Boolean)
      .sort((a, b) => Math.abs(b.pl) - Math.abs(a.pl));

    const positionsHtml = positions.length === 0
      ? `<div class="pf-empty">لا توجد أسهم مملوكة حاليًا</div>`
      : `<div class="pf-position-row header-row">
           <span>السهم</span><span>الكمية</span><span>سعر الشراء</span><span style="text-align:left">الربح/الخسارة</span>
         </div>` +
        positions.map(p => `
          <div class="pf-position-row">
            <span class="pf-pos-ticker">${p.ticker}</span>
            <span class="pf-pos-qty">${fmtInt(p.qty)}</span>
            <span class="pf-pos-avg">${fmt(p.avgPrice)}</span>
            <span class="pf-pos-pl ${p.pl >= 0 ? 'up' : 'down'}">${p.pl >= 0 ? '+' : ''}${fmtInt(p.pl)} (${p.pl >= 0 ? '+' : ''}${p.plPct.toFixed(1)}%)</span>
          </div>
        `).join('');

    return `
    <div class="portfolio-card ${i === 0 ? 'rank-1' : ''}">
      <div class="pf-header">
        <div class="pf-name-wrap">
          <span class="pf-dot" style="background:${g.color}"></span>
          <span class="pf-name">${g.name}</span>
        </div>
        <span class="pf-rank-badge">${i + 1}</span>
      </div>
      <div class="pf-totals">
        <div class="pf-total-item">
          <div class="pf-total-label">السيولة</div>
          <div class="pf-total-value">${fmtInt(g.balance)}</div>
        </div>
        <div class="pf-total-item">
          <div class="pf-total-label">قيمة الأسهم</div>
          <div class="pf-total-value">${fmtInt(g.stockVal)}</div>
        </div>
        <div class="pf-total-item">
          <div class="pf-total-label">الإجمالي</div>
          <div class="pf-total-value grand">${fmtInt(g.total)}</div>
        </div>
      </div>
      <div class="pf-positions">${positionsHtml}</div>
    </div>`;
  }).join('');
}

function addNewsItem(text) {
  const track = document.getElementById('newsTrack');
  const item = document.createElement('div');
  item.className = 'news-item';
  item.textContent = text;
  track.appendChild(item);
  while (track.children.length > 12) track.removeChild(track.firstChild);
}

function seedNews() {
  const track = document.getElementById('newsTrack');
  track.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const c = companies[Math.floor(Math.random() * companies.length)];
    const template = NEWS_TEMPLATES[Math.floor(Math.random() * NEWS_TEMPLATES.length)];
    addNewsItem(template(c));
  }
}

async function loadAll() {
  const [{ data: c, error: ce }, { data: g, error: ge }, { data: h, error: he }] = await Promise.all([
    sb.from('companies').select('*').order('ticker'),
    sb.from('groups').select('*'),
    sb.from('holdings').select('*'),
  ]);
  if (ce) console.error('companies error', ce);
  if (ge) console.error('groups error', ge);
  if (he) console.error('holdings error', he);

  companies = c || [];
  groups = g || [];
  holdings = h || [];
  companies.forEach(c => { priceHistory[c.id] = [c.current_price]; });
  renderTicker();
  renderStocks();
  renderPortfolios();
  seedNews();
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

loadAll();

const MIN_PRICE = 3;
const MAX_CHANGE_PERCENT = 30;

function volatilityRange(type) {
  switch (type) {
    case 'calm': return 6;
    case 'wild': return MAX_CHANGE_PERCENT;
    case 'trend_up': return 12;
    case 'trend_down': return 12;
    default: return 16;
  }
}

function biasedRandomChange(type) {
  const range = volatilityRange(type);
  let raw = (Math.random() * 2 - 1) * range;
  if (type === 'trend_up') raw = Math.abs(raw) * 0.75 + (Math.random() * 2 - 1) * 2;
  if (type === 'trend_down') raw = -Math.abs(raw) * 0.75 + (Math.random() * 2 - 1) * 2;
  return raw;
}

async function tickPrices() {
  if (!companies.length) return;
  console.log('⏱ تحديث أسعار جديد...');

  const updates = companies.map(c => {
    const changePct = biasedRandomChange(c.volatility_type || 'medium');
    let newPrice = c.current_price * (1 + changePct / 100);
    newPrice = Math.max(newPrice, MIN_PRICE);
    newPrice = Math.round(newPrice * 100) / 100;
    return { id: c.id, previous_price: c.current_price, current_price: newPrice, ticker: c.ticker, name: c.name };
  });

  let biggestMove = null;
  for (const u of updates) {
    const { error } = await sb.from('companies').update({ previous_price: u.previous_price, current_price: u.current_price, updated_at: new Date().toISOString() }).eq('id', u.id);
    if (error) console.error('price update error', error);
    const movePct = Math.abs((u.current_price - u.previous_price) / u.previous_price) * 100;
    if (!biggestMove || movePct > biggestMove.movePct) biggestMove = { ...u, movePct };
  }

  const historyRows = updates.map(u => ({ company_id: u.id, price: u.current_price }));
  await sb.from('price_history').insert(historyRows);

  if (biggestMove && biggestMove.movePct > 15) {
    playDing();
    const dir = biggestMove.current_price >= biggestMove.previous_price ? 'يقفز' : 'ينهار';
    addNewsItem(`عاجل: سهم ${biggestMove.ticker} ${dir} بنسبة ${biggestMove.movePct.toFixed(1)}% خلال لحظات`);
  } else {
    if (Math.random() < 0.5) {
      const c = companies[Math.floor(Math.random() * companies.length)];
      const template = NEWS_TEMPLATES[Math.floor(Math.random() * NEWS_TEMPLATES.length)];
      addNewsItem(template(c));
    }
  }
}

function scheduleNextTick() {
  const delay = 20000 + Math.random() * 20000;
  console.log(`⏳ التحديث القادم بعد ${(delay/1000).toFixed(0)} ثانية`);
  setTimeout(async () => {
    await tickPrices();
    scheduleNextTick();
  }, delay);
}
scheduleNextTick();

sb.channel('public:companies')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'companies' }, payload => {
    const idx = companies.findIndex(c => c.id === payload.new.id);
    const changed = {};
    if (idx >= 0) {
      changed[payload.new.id] = payload.new.current_price >= companies[idx].current_price ? 'up' : 'down';
      companies[idx] = payload.new;
      if (!priceHistory[payload.new.id]) priceHistory[payload.new.id] = [];
      priceHistory[payload.new.id].push(payload.new.current_price);
      if (priceHistory[payload.new.id].length > 10) priceHistory[payload.new.id].shift();
    }
    renderTicker();
    renderStocks(changed);
    renderPortfolios();
  })
  .subscribe();

sb.channel('public:groups')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'groups' }, payload => {
    if (payload.eventType === 'UPDATE') {
      const idx = groups.findIndex(g => g.id === payload.new.id);
      if (idx >= 0) groups[idx] = payload.new;
    } else if (payload.eventType === 'INSERT') {
      groups.push(payload.new);
    } else if (payload.eventType === 'DELETE') {
      groups = groups.filter(g => g.id !== payload.old.id);
    }
    renderPortfolios();
  })
  .subscribe();

sb.channel('public:holdings')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'holdings' }, payload => {
    if (payload.eventType === 'DELETE') {
      holdings = holdings.filter(h => h.id !== payload.old.id);
    } else {
      const idx = holdings.findIndex(h => h.id === payload.new.id);
      if (idx >= 0) holdings[idx] = payload.new;
      else holdings.push(payload.new);
    }
    renderPortfolios();
  })
  .subscribe();
</script>
