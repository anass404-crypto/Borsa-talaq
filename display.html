<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورصة تألق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-alt: #F7F8FA;
    --border: #E3E6EA;
    --text: #1A2332;
    --text-dim: #6B7684;
    --navy: #0B2545;
    --navy-light: #14365E;
    --up: #0E9F5C;
    --up-bg: #E7F7EF;
    --down: #D62B3C;
    --down-bg: #FCEAEC;
    --gold: #C9941F;
    --gold-bg: #FBF3E2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    height: 100vh;
    direction: rtl;
  }

  .ticker-wrap {
    background: var(--navy);
    height: 44px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .ticker-wrap::before, .ticker-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 50px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker-wrap::before { right: 0; background: linear-gradient(to left, var(--navy), transparent); }
  .ticker-wrap::after { left: 0; background: linear-gradient(to right, var(--navy), transparent); }
  .ticker-track {
    display: flex;
    gap: 36px;
    white-space: nowrap;
    animation: scroll-rtl 55s linear infinite;
    padding-right: 100%;
  }
  @keyframes scroll-rtl { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  .ticker-item { display: flex; align-items: center; gap: 7px; font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 14px; color: #fff; }
  .ticker-item .tk-name { color: #9BB1CC; font-weight: 500; font-size: 12px; }
  .ticker-item .tk-price { font-variant-numeric: tabular-nums; }
  .ticker-item .tk-change { font-size: 12px; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .ticker-wrap .up { color: #4ADE9B; }
  .ticker-wrap .down { color: #FF8A98; }

  .news-bar {
    background: var(--gold-bg);
    border-bottom: 1px solid var(--border);
    height: 32px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .news-tag {
    background: var(--gold);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-weight: 800;
    font-size: 11px;
    padding: 4px 12px;
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    z-index: 3;
  }
  .news-track-wrap { flex: 1; overflow: hidden; position: relative; height: 100%; }
  .news-track {
    display: flex;
    gap: 50px;
    white-space: nowrap;
    position: absolute;
    animation: scroll-rtl 40s linear infinite;
    padding-right: 100%;
    align-items: center;
    height: 100%;
  }
  .news-item { font-size: 12.5px; color: #6B5410; font-weight: 600; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 26px;
    border-bottom: 1px solid var(--border);
  }
  .brand { font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 21px; color: var(--navy); }
  .brand span { color: var(--gold); }
  .market-index { display: flex; align-items: center; gap: 9px; font-family: 'Tajawal', sans-serif; }
  .market-index .idx-label { color: var(--text-dim); font-size: 12px; font-family: 'Cairo', sans-serif; }
  .market-index .idx-value { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--navy); }
  .clock { color: var(--text-dim); font-size: 12px; font-variant-numeric: tabular-nums; }

  .main {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 0;
    height: calc(100vh - 44px - 32px - 57px);
  }
  .panel { overflow-y: auto; padding: 16px 22px; }
  .panel:first-child { border-left: 1px solid var(--border); }
  .panel-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .panel-title::before { content: ''; width: 3px; height: 13px; background: var(--gold); border-radius: 2px; }

  .stock-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .stock-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
  }
  .stock-card.flash-up { animation: flashUp 1s ease; }
  .stock-card.flash-down { animation: flashDown 1s ease; }
  @keyframes flashUp { 0% { background: var(--up-bg); border-color: var(--up); } 100% { background: var(--bg); } }
  @keyframes flashDown { 0% { background: var(--down-bg); border-color: var(--down); } 100% { background: var(--bg); } }

  .stock-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .stock-ticker { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 14px; color: var(--navy); }
  .stock-sector { font-size: 9px; color: var(--text-dim); background: var(--bg-alt); padding: 2px 6px; border-radius: 4px; }
  .stock-name { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .stock-bottom { display: flex; justify-content: space-between; align-items: flex-end; gap: 6px; }
  .stock-price { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 18px; font-variant-numeric: tabular-nums; }
  .stock-change { font-size: 11.5px; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 3px; }
  .spark { flex-shrink: 0; }

  .leader-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .leader-card.rank-1 { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,148,31,0.18); }
  .leader-rank {
    position: absolute; top: 0; right: 0;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 13px;
    background: var(--bg-alt);
    border-radius: 0 10px 0 10px;
    color: var(--text-dim);
  }
  .rank-1 .leader-rank { background: var(--gold); color: #fff; }
  .leader-top { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
  .leader-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .leader-name { font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 16px; color: var(--navy); }
  .leader-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .leader-total-label { font-size: 11px; color: var(--text-dim); }
  .leader-total { font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 21px; font-variant-numeric: tabular-nums; color: var(--navy); }

  .dist-bar { display: flex; height: 18px; border-radius: 5px; overflow: hidden; margin-bottom: 6px; background: var(--bg-alt); }
  .dist-seg { height: 100%; }
  .dist-legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 10px; color: var(--text-dim); }
  .dist-legend-item { display: flex; align-items: center; gap: 4px; }
  .dist-legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<div class="news-bar">
  <div class="news-tag">عاجل</div>
  <div class="news-track-wrap"><div class="news-track" id="newsTrack"></div></div>
</div>

<div class="header">
  <div class="brand">بورصة <span>تألق</span></div>
  <div class="market-index">
    <span class="idx-label">المؤشر العام</span>
    <span class="idx-value" id="marketIndex">—</span>
    <span class="stock-change" id="marketIndexChange"></span>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-title">سوق الأسهم</div>
    <div class="stock-grid" id="stockGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">ترتيب المحافظ</div>
    <div id="leaderboard"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://reiyrcqafvejnbeejava.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2FGcmrEoGCouOiaDy_1HGw_qjzRYocC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let companies = [];
let groups = [];
let holdings = [];
let priceHistory = {};
const GROUP_COLORS_BY_COMPANY = ['#0B2545','#0E9F5C','#C9941F','#D62B3C','#6B7684','#14365E','#9BB1CC','#6B5410','#4ADE9B','#FF8A98','#1A2332','#E3E6EA','#FBF3E2','#E7F7EF','#FCEAEC'];

const NEWS_TEMPLATES = [
  c => `صفقة كبيرة: مؤسسة مالية تنفذ شراء ضخم على سهم ${c.ticker}`,
  c => `تقارير: ${c.name} تسجل نشاطًا تداوليًا لافتًا اليوم`,
  c => `محللون: سهم ${c.ticker} يشهد تذبذبًا واسعًا في الجلسة الحالية`,
  c => `${c.name} ضمن الأسهم الأكثر تداولًا حاليًا`,
];

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    return `<div class="ticker-item">
      <span class="tk-ticker">${c.ticker}</span>
      <span class="tk-name">${c.name}</span>
      <span class="tk-price">${fmt(c.current_price)}</span>
      <span class="tk-change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>
    </div>`;
  }).join('');
  track.innerHTML = items + items;
}

function renderSparkline(history) {
  if (!history || history.length < 2) return '';
  const w = 56, h = 22;
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const points = history.map((p, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((p - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const trendUp = history[history.length - 1] >= history[0];
  const color = trendUp ? 'var(--up)' : 'var(--down)';
  return `<svg class="spark" width="${w}" height="${h}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderStocks(changedIds = {}) {
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    const flashClass = changedIds[c.id] ? (changedIds[c.id] === 'up' ? 'flash-up' : 'flash-down') : '';
    const spark = renderSparkline(priceHistory[c.id] || []);
    return `<div class="stock-card ${flashClass}">
      <div class="stock-top">
        <span class="stock-ticker">${c.ticker}</span>
        <span class="stock-sector">${c.sector || ''}</span>
      </div>
      <div class="stock-name">${c.name}</div>
      <div class="stock-bottom">
        <div>
          <div class="stock-price">${fmt(c.current_price)}</div>
          <div class="stock-change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</div>
        </div>
        ${spark}
      </div>
    </div>`;
  }).join('');

  const avgPct = companies.length
    ? companies.reduce((sum, c) => sum + (c.previous_price ? ((c.current_price - c.previous_price) / c.previous_price) * 100 : 0), 0) / companies.length
    : 0;
  document.getElementById('marketIndex').textContent = (10000 * (1 + avgPct/100)).toFixed(2);
  const idxChangeEl = document.getElementById('marketIndexChange');
  idxChangeEl.className = 'stock-change ' + (avgPct >= 0 ? 'up' : 'down');
  idxChangeEl.textContent = (avgPct >= 0 ? '▲ ' : '▼ ') + Math.abs(avgPct).toFixed(2) + '%';
}

function portfolioValue(groupId) {
  return holdings.filter(h => h.group_id === groupId).reduce((sum, h) => {
    const c = companies.find(c => c.id === h.company_id);
    return sum + (c ? c.current_price * h.shares_owned : 0);
  }, 0);
}

function renderLeaderboard() {
  const board = document.getElementById('leaderboard');
  const ranked = [...groups]
    .map(g => ({ ...g, portfolioVal: portfolioValue(g.id), total: g.balance + portfolioValue(g.id) }))
    .sort((a, b) => b.total - a.total);

  board.innerHTML = ranked.map((g, i) => {
    const total = g.total || 1;
    const cashPct = (g.balance / total) * 100;
    const groupHoldings = holdings.filter(h => h.group_id === g.id && h.shares_owned > 0);

    let distSegs = `<div class="dist-seg" style="width:${cashPct}%; background:${g.color}"></div>`;
    let legendItems = `<div class="dist-legend-item"><span class="dist-legend-dot" style="background:${g.color}"></span>نقد ${cashPct.toFixed(0)}%</div>`;

    groupHoldings.forEach((h, idx) => {
      const c = companies.find(c => c.id === h.company_id);
      if (!c) return;
      const val = c.current_price * h.shares_owned;
      const pct = (val / total) * 100;
      const color = GROUP_COLORS_BY_COMPANY[idx % GROUP_COLORS_BY_COMPANY.length];
      distSegs += `<div class="dist-seg" style="width:${pct}%; background:${color}"></div>`;
      legendItems += `<div class="dist-legend-item"><span class="dist-legend-dot" style="background:${color}"></span>${c.ticker} ${pct.toFixed(0)}%</div>`;
    });

    return `
    <div class="leader-card ${i === 0 ? 'rank-1' : ''}">
      <div class="leader-rank">${i + 1}</div>
      <div class="leader-top">
        <span class="leader-dot" style="background:${g.color}"></span>
        <span class="leader-name">${g.name}</span>
      </div>
      <div class="leader-total-row">
        <span class="leader-total-label">إجمالي القيمة</span>
        <span class="leader-total">${fmtInt(g.total)} ر.س</span>
      </div>
      <div class="dist-bar">${distSegs}</div>
      <div class="dist-legend">${legendItems}</div>
    </div>`;
  }).join('');
}

function addNewsItem(text) {
  const track = document.getElementById('newsTrack');
  const item = document.createElement('div');
  item.className = 'news-item';
  item.textContent = text;
  track.appendChild(item);
  while (track.children.length > 12) track.removeChild(track.firstChild);
}

function seedNews() {
  const track = document.getElementById('newsTrack');
  track.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const c = companies[Math.floor(Math.random() * companies.length)];
    const template = NEWS_TEMPLATES[Math.floor(Math.random() * NEWS_TEMPLATES.length)];
    addNewsItem(template(c));
  }
}

async function loadAll() {
  const [{ data: c }, { data: g }, { data: h }] = await Promise.all([
    sb.from('companies').select('*').order('ticker'),
    sb.from('groups').select('*'),
    sb.from('holdings').select('*'),
  ]);
  companies = c || [];
  groups = g || [];
  holdings = h || [];
  companies.forEach(c => { priceHistory[c.id] = [c.current_price]; });
  renderTicker();
  renderStocks();
  renderLeaderboard();
  seedNews();
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

loadAll();

const MIN_PRICE = 3;
const MAX_CHANGE_PERCENT = 30;

function volatilityRange(type) {
  switch (type) {
    case 'calm': return 6;
    case 'wild': return MAX_CHANGE_PERCENT;
    case 'trend_up': return 12;
    case 'trend_down': return 12;
    default: return 16;
  }
}

function biasedRandomChange(type) {
  const range = volatilityRange(type);
  let raw = (Math.random() * 2 - 1) * range;
  if (type === 'trend_up') raw = Math.abs(raw) * 0.75 + (Math.random() * 2 - 1) * 2;
  if (type === 'trend_down') raw = -Math.abs(raw) * 0.75 + (Math.random() * 2 - 1) * 2;
  return raw;
}

async function tickPrices() {
  if (!companies.length) return;

  const updates = companies.map(c => {
    const changePct = biasedRandomChange(c.volatility_type || 'medium');
    let newPrice = c.current_price * (1 + changePct / 100);
    newPrice = Math.max(newPrice, MIN_PRICE);
    newPrice = Math.round(newPrice * 100) / 100;
    return { id: c.id, previous_price: c.current_price, current_price: newPrice, ticker: c.ticker, name: c.name };
  });

  let biggestMove = null;
  for (const u of updates) {
    await sb.from('companies').update({ previous_price: u.previous_price, current_price: u.current_price, updated_at: new Date().toISOString() }).eq('id', u.id);
    const movePct = Math.abs((u.current_price - u.previous_price) / u.previous_price) * 100;
    if (!biggestMove || movePct > biggestMove.movePct) biggestMove = { ...u, movePct };
  }

  const historyRows = updates.map(u => ({ company_id: u.id, price: u.current_price }));
  await sb.from('price_history').insert(historyRows);

  if (biggestMove && biggestMove.movePct > 15) {
    playDing();
    const dir = biggestMove.current_price >= biggestMove.previous_price ? 'يقفز' : 'ينهار';
    addNewsItem(`عاجل: سهم ${biggestMove.ticker} ${dir} بنسبة ${biggestMove.movePct.toFixed(1)}% خلال لحظات`);
  } else {
    if (Math.random() < 0.4) {
      const c = companies[Math.floor(Math.random() * companies.length)];
      const template = NEWS_TEMPLATES[Math.floor(Math.random() * NEWS_TEMPLATES.length)];
      addNewsItem(template(c));
    }
  }
}

function scheduleNextTick() {
  const delay = 20000 + Math.random() * 20000;
  setTimeout(async () => {
    await tickPrices();
    scheduleNextTick();
  }, delay);
}
scheduleNextTick();

sb.channel('public:companies')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'companies' }, payload => {
    const idx = companies.findIndex(c => c.id === payload.new.id);
    const changed = {};
    if (idx >= 0) {
      changed[payload.new.id] = payload.new.current_price >= companies[idx].current_price ? 'up' : 'down';
      companies[idx] = payload.new;
      if (!priceHistory[payload.new.id]) priceHistory[payload.new.id] = [];
      priceHistory[payload.new.id].push(payload.new.current_price);
      if (priceHistory[payload.new.id].length > 10) priceHistory[payload.new.id].shift();
    }
    renderTicker();
    renderStocks(changed);
    renderLeaderboard();
  })
  .subscribe();

sb.channel('public:groups')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'groups' }, payload => {
    if (payload.eventType === 'UPDATE') {
      const idx = groups.findIndex(g => g.id === payload.new.id);
      if (idx >= 0) groups[idx] = payload.new;
    } else if (payload.eventType === 'INSERT') {
      groups.push(payload.new);
    } else if (payload.eventType === 'DELETE') {
      groups = groups.filter(g => g.id !== payload.old.id);
    }
    renderLeaderboard();
  })
  .subscribe();

sb.channel('public:holdings')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'holdings' }, payload => {
    if (payload.eventType === 'DELETE') {
      holdings = holdings.filter(h => h.id !== payload.old.id);
    } else {
      const idx = holdings.findIndex(h => h.id === payload.new.id);
      if (idx >= 0) holdings[idx] = payload.new;
      else holdings.push(payload.new);
    }
    renderLeaderboard();
  })
  .subscribe();
</script>
</body>
</html>
