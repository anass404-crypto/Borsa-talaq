<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بورصة تألق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0A0E14;
    --surface: #131820;
    --surface-2: #1A2029;
    --border: #232a35;
    --text: #E8EAED;
    --text-dim: #6B7684;
    --up: #00D964;
    --down: #FF3B5C;
    --gold: #D4A645;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    height: 100vh;
    direction: rtl;
  }

  /* ===== Ticker tape ===== */
  .ticker-wrap {
    background: linear-gradient(180deg, #161c25, #0F1319);
    border-bottom: 1px solid var(--border);
    height: 52px;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .ticker-wrap::before, .ticker-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker-wrap::before {
    right: 0;
    background: linear-gradient(to left, #0F1319, transparent);
  }
  .ticker-wrap::after {
    left: 0;
    background: linear-gradient(to right, #0F1319, transparent);
  }
  .ticker-track {
    display: flex;
    gap: 40px;
    white-space: nowrap;
    animation: scroll-rtl 60s linear infinite;
    padding-right: 100%;
  }
  @keyframes scroll-rtl {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }
  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }
  .ticker-item .tk-name { color: var(--text-dim); font-weight: 500; font-size: 13px; }
  .ticker-item .tk-price { font-variant-numeric: tabular-nums; }
  .ticker-item .tk-change { font-size: 13px; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -0.5px;
  }
  .brand span { color: var(--gold); }
  .market-index {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Tajawal', sans-serif;
  }
  .market-index .idx-label { color: var(--text-dim); font-size: 13px; font-family: 'Cairo', sans-serif; }
  .market-index .idx-value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .clock { color: var(--text-dim); font-size: 13px; font-variant-numeric: tabular-nums; }
  .next-tick {
    color: var(--text-dim);
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-variant-numeric: tabular-nums;
  }
  .next-tick span { color: var(--gold); font-weight: 700; }

  /* ===== Layout ===== */
  .main {
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    gap: 1px;
    background: var(--border);
    height: calc(100vh - 52px - 65px);
  }
  .panel { background: var(--bg); overflow-y: auto; padding: 20px 24px; }
  .panel-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--gold);
    border-radius: 2px;
  }

  /* ===== Stock grid ===== */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    transition: border-color 0.3s ease;
  }
  .stock-card.flash-up { animation: flashUp 0.9s ease; }
  .stock-card.flash-down { animation: flashDown 0.9s ease; }
  @keyframes flashUp { 0% { background: rgba(0,217,100,0.18); } 100% { background: var(--surface); } }
  @keyframes flashDown { 0% { background: rgba(255,59,92,0.18); } 100% { background: var(--surface); } }

  .stock-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .stock-ticker { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 15px; }
  .stock-sector { font-size: 10px; color: var(--text-dim); background: var(--surface-2); padding: 2px 7px; border-radius: 4px; }
  .stock-name { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .stock-price { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 22px; font-variant-numeric: tabular-nums; }
  .stock-change { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 4px; }

  /* ===== Leaderboard ===== */
  .leader-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .leader-card.rank-1 { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 4px 20px rgba(212,166,69,0.15); }
  .leader-rank {
    position: absolute; top: 0; right: 0;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 15px;
    background: var(--surface-2);
    border-radius: 0 12px 0 12px;
    color: var(--text-dim);
  }
  .rank-1 .leader-rank { background: var(--gold); color: #1a1505; }
  .leader-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .leader-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leader-name { font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 17px; }
  .leader-stats { display: flex; justify-content: space-between; align-items: baseline; }
  .leader-stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  .leader-stat-value { font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 19px; font-variant-numeric: tabular-nums; }
  .leader-total { font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 24px; font-variant-numeric: tabular-nums; color: var(--gold); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<div class="header">
  <div class="brand">بورصة <span>تألق</span></div>
  <div class="market-index">
    <span class="idx-label">المؤشر العام</span>
    <span class="idx-value" id="marketIndex">—</span>
    <span class="stock-change" id="marketIndexChange"></span>
  </div>
  <div class="clock" id="clock"></div>
  <div class="next-tick">تحديث بعد <span id="tickCountdown">30</span>ث</div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-title">سوق الأسهم — 15 شركة</div>
    <div class="stock-grid" id="stockGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">ترتيب المحافظ</div>
    <div id="leaderboard"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://reiyrcqafvejnbeejava.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2FGcmrEoGCouOiaDy_1HGw_qjzRYocC';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let companies = [];
let groups = [];
let holdings = [];

function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderTicker() {
  const track = document.getElementById('tickerTrack');
  const items = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    return `<div class="ticker-item">
      <span class="tk-ticker">${c.ticker}</span>
      <span class="tk-name">${c.name}</span>
      <span class="tk-price">${fmt(c.current_price)}</span>
      <span class="tk-change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>
    </div>`;
  }).join('');
  // duplicate for seamless loop
  track.innerHTML = items + items;
}

function renderStocks(changedIds = {}) {
  const grid = document.getElementById('stockGrid');
  grid.innerHTML = companies.map(c => {
    const change = c.current_price - c.previous_price;
    const pct = c.previous_price ? (change / c.previous_price) * 100 : 0;
    const cls = change >= 0 ? 'up' : 'down';
    const arrow = change >= 0 ? '▲' : '▼';
    const flashClass = changedIds[c.id] ? (changedIds[c.id] === 'up' ? 'flash-up' : 'flash-down') : '';
    return `<div class="stock-card ${flashClass}">
      <div class="stock-top">
        <span class="stock-ticker">${c.ticker}</span>
        <span class="stock-sector">${c.sector || ''}</span>
      </div>
      <div class="stock-name">${c.name}</div>
      <div class="stock-price">${fmt(c.current_price)}</div>
      <div class="stock-change ${cls}">${arrow} ${fmt(Math.abs(change))} (${Math.abs(pct).toFixed(2)}%)</div>
    </div>`;
  }).join('');

  // compute simple market index = average pct change
  const avgPct = companies.length
    ? companies.reduce((sum, c) => sum + (c.previous_price ? ((c.current_price - c.previous_price) / c.previous_price) * 100 : 0), 0) / companies.length
    : 0;
  document.getElementById('marketIndex').textContent = (10000 * (1 + avgPct/100)).toFixed(2);
  const idxChangeEl = document.getElementById('marketIndexChange');
  idxChangeEl.className = 'stock-change ' + (avgPct >= 0 ? 'up' : 'down');
  idxChangeEl.textContent = (avgPct >= 0 ? '▲ ' : '▼ ') + Math.abs(avgPct).toFixed(2) + '%';
}

function portfolioValue(groupId) {
  return holdings
    .filter(h => h.group_id === groupId)
    .reduce((sum, h) => {
      const c = companies.find(c => c.id === h.company_id);
      return sum + (c ? c.current_price * h.shares_owned : 0);
    }, 0);
}

function renderLeaderboard() {
  const board = document.getElementById('leaderboard');
  const ranked = [...groups]
    .map(g => ({ ...g, portfolioVal: portfolioValue(g.id), total: g.balance + portfolioValue(g.id) }))
    .sort((a, b) => b.total - a.total);

  board.innerHTML = ranked.map((g, i) => `
    <div class="leader-card ${i === 0 ? 'rank-1' : ''}">
      <div class="leader-rank">${i + 1}</div>
      <div class="leader-top">
        <span class="leader-dot" style="background:${g.color}"></span>
        <span class="leader-name">${g.name}</span>
      </div>
      <div class="leader-stats">
        <div>
          <div class="leader-stat-label">السيولة النقدية</div>
          <div class="leader-stat-value">${fmt(g.balance)}</div>
        </div>
        <div>
          <div class="leader-stat-label">قيمة الأسهم</div>
          <div class="leader-stat-value">${fmt(g.portfolioVal)}</div>
        </div>
        <div style="text-align:left">
          <div class="leader-stat-label">الإجمالي</div>
          <div class="leader-total">${fmt(g.total)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

async function loadAll() {
  const [{ data: c }, { data: g }, { data: h }] = await Promise.all([
    sb.from('companies').select('*').order('ticker'),
    sb.from('groups').select('*'),
    sb.from('holdings').select('*'),
  ]);
  companies = c || [];
  groups = g || [];
  holdings = h || [];
  renderTicker();
  renderStocks();
  renderLeaderboard();
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

loadAll();

// ===== محرك تحديث الأسعار التلقائي =====
// يولّد نسبة تغيّر عشوائية بين -5% و +5% لكل شركة كل 30 ثانية
const PRICE_UPDATE_INTERVAL = 30000; // 30 ثانية
const MAX_CHANGE_PERCENT = 5;

async function tickPrices() {
  if (!companies.length) return;

  // نحدّث كل شركة بقيمة عشوائية مستقلة
  const updates = companies.map(c => {
    const changePct = (Math.random() * 2 - 1) * MAX_CHANGE_PERCENT; // بين -5% و +5%
    let newPrice = c.current_price * (1 + changePct / 100);
    newPrice = Math.max(newPrice, 1); // لا يقل السعر عن 1 ريال
    newPrice = Math.round(newPrice * 100) / 100; // تقريب لمنزلتين عشريتين
    return { id: c.id, previous_price: c.current_price, current_price: newPrice };
  });

  // نرسل التحديثات لقاعدة البيانات (Realtime يبث النتيجة تلقائيًا لكل الشاشات)
  for (const u of updates) {
    await sb.from('companies')
      .update({ previous_price: u.previous_price, current_price: u.current_price, updated_at: new Date().toISOString() })
      .eq('id', u.id);
  }

  // نسجل كل سعر بجدول price_history (لرسم بياني مستقبلي)
  const historyRows = updates.map(u => ({ company_id: u.id, price: u.current_price }));
  await sb.from('price_history').insert(historyRows);
}

setInterval(tickPrices, PRICE_UPDATE_INTERVAL);

// ===== عداد تنازلي بصري للتحديث القادم =====
let secondsLeft = PRICE_UPDATE_INTERVAL / 1000;
function updateCountdown() {
  secondsLeft -= 1;
  if (secondsLeft <= 0) secondsLeft = PRICE_UPDATE_INTERVAL / 1000;
  document.getElementById('tickCountdown').textContent = secondsLeft;
}
setInterval(updateCountdown, 1000);

// ===== Realtime subscriptions =====
sb.channel('public:companies')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'companies' }, payload => {
    const idx = companies.findIndex(c => c.id === payload.new.id);
    const changed = {};
    if (idx >= 0) {
      changed[payload.new.id] = payload.new.current_price >= companies[idx].current_price ? 'up' : 'down';
      companies[idx] = payload.new;
    }
    renderTicker();
    renderStocks(changed);
    renderLeaderboard();
  })
  .subscribe();

sb.channel('public:groups')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'groups' }, payload => {
    if (payload.eventType === 'UPDATE') {
      const idx = groups.findIndex(g => g.id === payload.new.id);
      if (idx >= 0) groups[idx] = payload.new;
    } else if (payload.eventType === 'INSERT') {
      groups.push(payload.new);
    } else if (payload.eventType === 'DELETE') {
      groups = groups.filter(g => g.id !== payload.old.id);
    }
    renderLeaderboard();
  })
  .subscribe();

sb.channel('public:holdings')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'holdings' }, payload => {
    if (payload.eventType === 'DELETE') {
      holdings = holdings.filter(h => h.id !== payload.old.id);
    } else {
      const idx = holdings.findIndex(h => h.id === payload.new.id);
      if (idx >= 0) holdings[idx] = payload.new;
      else holdings.push(payload.new);
    }
    renderLeaderboard();
  })
  .subscribe();
</script>
</body>
</html>
